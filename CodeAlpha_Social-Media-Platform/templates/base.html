<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SocialSpace{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'feed' %}" class="nav-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
                </svg>
                SocialSpace
            </a>
            <div class="nav-search">
                <form action="{% url 'explore' %}" method="get">
                    <input type="text" name="q" placeholder="Search users or posts..." value="{{ request.GET.q }}">
                    <button type="submit">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>
                </form>
            </div>
            <div class="nav-links">
                <a href="{% url 'feed' %}" class="nav-link {% if request.resolver_match.url_name == 'feed' %}active{% endif %}" title="Home">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                </a>
                <a href="{% url 'explore' %}" class="nav-link {% if request.resolver_match.url_name == 'explore' %}active{% endif %}" title="Explore">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                </a>
                <!-- Bell with live unread badge -->
                <a href="{% url 'notifications' %}" class="nav-link nav-notif-link {% if request.resolver_match.url_name == 'notifications' %}active{% endif %}" title="Notifications" id="notifBellLink">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                    <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
                </a>
                <a href="{% url 'profile' username=user.username %}" class="nav-link nav-avatar" title="Profile">
                    <img src="{{ user.profile.get_avatar_url }}" alt="{{ user.username }}">
                </a>
                <a href="{% url 'logout' %}" class="nav-link nav-logout" title="Logout">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                </a>
            </div>
        </div>
    </nav>

    <!-- Toast notification container -->
    <div id="toastContainer" class="toast-container"></div>
    {% endif %}

    <main class="{% if user.is_authenticated %}main-content{% else %}auth-content{% endif %}">
        {% if messages %}
        <div class="messages-container">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'js/main.js' %}"></script>
    {% if user.is_authenticated %}
    <script>
        window.NOTIF_UNREAD_URL = '{% url "notifications_unread" %}';
        window.NOTIF_MARK_READ_URL = '{% url "mark_notifications_read" %}';
        window.IS_NOTIF_PAGE = '{{ request.resolver_match.url_name }}' === 'notifications';
        window.CSRF_TOKEN = '{{ csrf_token }}';
    </script>
    {% endif %}
    {% block extra_js %}{% endblock %}
</body>
</html>
