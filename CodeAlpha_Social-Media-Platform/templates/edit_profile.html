{% extends 'base.html' %}
{% block title %}Edit Profile - SocialSpace{% endblock %}
{% block content %}
<div class="settings-layout">
    <div class="settings-card card">
        <h2 class="settings-title">Edit Profile</h2>

        <form method="post" enctype="multipart/form-data" class="settings-form">
            {% csrf_token %}
            <div class="avatar-upload-section">
                <img src="{{ user.profile.get_avatar_url }}" alt="{{ user.username }}" class="avatar avatar-xl" id="avatarPreview">
                <label class="btn btn-ghost btn-sm" for="id_avatar">Change Photo</label>
                <input type="file" id="id_avatar" name="avatar" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" value="{{ user.first_name }}" placeholder="First name">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" value="{{ user.last_name }}" placeholder="Last name">
                </div>
            </div>
            <div class="form-group">
                <label>Bio</label>
                <textarea name="bio" rows="3" placeholder="Tell people about yourself...">{{ form.bio.value|default:'' }}</textarea>
            </div>
            <div class="form-group">
                <label>Website</label>
                <input type="url" name="website" value="{{ form.website.value|default:'' }}" placeholder="https://yourwebsite.com">
            </div>

            <div class="form-actions">
                <a href="{% url 'profile' username=user.username %}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function previewAvatar(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => document.getElementById('avatarPreview').src = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
