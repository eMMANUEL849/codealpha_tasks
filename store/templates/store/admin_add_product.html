{% extends 'store/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <p class="text-uppercase fw-semibold text-secondary mb-1">Admin / Add Product</p>
        <h2 class="fw-bold">Create New Product</h2>
    </div>
    <a href="{% url 'admin_products' %}" class="btn btn-outline-secondary">Back to Products</a>
</div>

<div class="card card-shadow border-0">
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" class="form-control" name="name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="description" rows="4" required></textarea>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label class="form-label">Price</label>
                    <input type="number" step="0.01" class="form-control" name="price" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Stock</label>
                    <input type="number" class="form-control" name="stock" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Image URL</label>
                    <input type="url" class="form-control" name="image">
                </div>
            </div>
            <button class="btn btn-primary">Create Product</button>
        </form>
    </div>
</div>
{% endblock %}
