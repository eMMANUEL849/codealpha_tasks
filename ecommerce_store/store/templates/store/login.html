{% extends 'store/base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card card-shadow border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Welcome Back</h2>
                    <p class="text-muted">Login to access your account and complete your purchase.</p>
                </div>

                <form method="POST" novalidate>
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary btn-lg btn-pill w-100">Login</button>
                </form>

                <p class="text-center text-muted small mt-4 mb-0">New here? <a href="{% url 'register' %}">Create an account</a></p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
